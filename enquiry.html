<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | Alph Teach Auto & Towing Services </title>
</head>
<body>
<a href="index.html">Home</a>
<a href="About.html">About</a>
<a href="Service.html">Services</a>
<a href="Enquiry.html">Enquiry</a>
<a href="Contact.html">Contact</a>

<form action="#" method="post">

    
    <h3>Your Contact Information</h3>
    
    <label>Full Name *</label>
    <input type="text" name="fullname" placeholder="e.g., John Smith" required>
    
    <label>Phone Number *</label>
    <input type="tel" name="phone" placeholder="e.g., 082 123 4567" required>
    
    <label>Email Address</label>
    <input type="email" name="email" placeholder="you@example.com">
    
    <hr>
    
    <h3>Service Required *</h3>
    
    <select name="service_type" required>
        <option value="">-- Select Service Type --</option>
        <option value="towing">Towing Service</option>
        <option value="repair">Auto Repair / Workshop</option>
        <option value="roadside">Roadside Assistance</option>
        <option value="maintenance">Maintenance Service</option>
        <option value="quote">General Quote Request</option>
    </select>
    
    <hr>
    
    <h3>Vehicle Details</h3>
    
    <label>Vehicle Make & Model</label>
    <input type="text" name="vehicle" placeholder="e.g., Toyota Corolla 2018">
    
    <label>Registration Number</label>
    <input type="text" name="reg_number" placeholder="e.g., ABC 123 GP">
    
    <label>Vehicle Colour</label>
    <input type="text" name="colour" placeholder="e.g., Silver">
    
    <hr>
    
    <h3>Location (For Towing or Roadside Assistance)</h3>
    
    <label>Current Location / Address</label>
    <textarea name="location" rows="2" placeholder="Where are you currently located?"></textarea>
    
    <label>Destination (For Towing)</label>
    <input type="text" name="destination" placeholder="Where do you need the vehicle taken?">
    
    <hr>
    
    <h3>Description of Issue / Service Needed</h3>
    
    <textarea name="description" rows="4" placeholder="Please describe what happened or what service you need..."></textarea>
    
    <hr>
    
    <h3>Emergency?</h3>
    
    <label>
        <input type="checkbox" name="emergency"> 
        This is an emergency - I need immediate assistance
    </label>
    
    <hr>
    
    <h3>Preferred Contact Method</h3>
    
    <label>
        <input type="radio" name="contact_method" value="phone" checked> Phone Call
    </label>
    <label>
        <input type="radio" name="contact_method" value="whatsapp"> WhatsApp
    </label>
    <label>
        <input type="radio" name="contact_method" value="email"> Email
    </label>
    
    <hr>
    
    <h3>Preferred Contact Time</h3>
    
    <select name="contact_time">
        <option value="anytime">Anytime</option>
        <option value="morning">Morning (8am - 12pm)</option>
        <option value="afternoon">Afternoon (12pm - 5pm)</option>
        <option value="evening">Evening (5pm - 8pm)</option>
    </select>
    
    <hr>
    
    <label>
        <input type="checkbox" name="newsletter"> 
        Send me service reminders and special offers via WhatsApp/Email
    </label>
    
    <hr>
    
    <button type="submit">SUBMIT ENQUIRY</button>
    <button type="reset">Clear Form</button>
    
</form>
</body>
</html>
